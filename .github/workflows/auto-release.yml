name: Auto Publish Agent Images

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      update_descriptions:
        description: 'Update Docker Hub descriptions for all agents (skips image publish)'
        type: boolean
        default: false

concurrency:
  group: auto-publish-agent-images
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      updates_count: ${{ steps.detect.outputs.updates_count }}
      checked_at: ${{ steps.detect.outputs.checked_at }}
      matrix: ${{ steps.detect.outputs.matrix }}
      updates_json: ${{ steps.detect.outputs.updates_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone wiki repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" \
            wiki

      - name: Verify wiki state exists
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f wiki/automation/agent-versions.json ]]; then
            echo "Missing wiki/automation/agent-versions.json in wiki repository."
            echo "Initialize wiki state locally before running CI updates."
            exit 1
          fi
          if [[ ! -f wiki/Container-Versions.md ]]; then
            echo "Missing wiki/Container-Versions.md in wiki repository."
            echo "Create the page in the wiki before running CI updates."
            exit 1
          fi

      - name: Detect upstream CLI updates
        id: detect
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/check-agent-updates.mjs \
            --catalog wiki/automation/agent-versions.json \
            --report wiki/automation/agent-update-report.json \
            --github-output "${GITHUB_OUTPUT}" \
            --step-summary "${GITHUB_STEP_SUMMARY}"

  publish:
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AGENT_NAMESPACE: vibepod
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure Docker Hub credentials are present
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" || -z "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "Missing DOCKERHUB_USERNAME or DOCKERHUB_TOKEN secrets"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.docker_context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          build-args: ${{ matrix.build_args }}
          push: true
          tags: |
            ${{ env.AGENT_NAMESPACE }}/${{ matrix.image_name }}:${{ matrix.image_tag }}
            ${{ env.AGENT_NAMESPACE }}/${{ matrix.image_name }}:latest
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  update-catalog:
    needs:
      - detect
      - publish
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone wiki repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" \
            wiki

      - name: Apply release metadata updates
        shell: bash
        env:
          UPDATES_JSON: ${{ needs.detect.outputs.updates_json }}
          CHECKED_AT: ${{ needs.detect.outputs.checked_at }}
        run: |
          set -euo pipefail
          node scripts/apply-agent-updates.mjs \
            --catalog wiki/automation/agent-versions.json \
            --updates-json "${UPDATES_JSON}" \
            --output-page wiki/Container-Versions.md \
            --generated-at "${CHECKED_AT}"

      - name: Generate Docker Hub descriptions
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-hub-descriptions.mjs \
            --catalog wiki/automation/agent-versions.json \
            --descriptions descriptions

      - name: Update Docker Hub descriptions
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r .token)
          if [[ -z "${TOKEN}" || "${TOKEN}" == "null" ]]; then
            echo "error: Docker Hub login failed — check DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets"
            exit 1
          fi

          for agent in auggie claude codex copilot devstral gemini opencode; do
            output_dir="descriptions/${agent}/output"
            if [[ ! -f "${output_dir}/short-description.txt" || ! -f "${output_dir}/overview.md" ]]; then
              echo "Skipping ${agent}: output files not found"
              continue
            fi
            SHORT=$(cat "${output_dir}/short-description.txt")
            FULL=$(cat "${output_dir}/overview.md")
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X PATCH "https://hub.docker.com/v2/repositories/vibepod/${agent}/" \
              -H "Authorization: JWT ${TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary "$(jq -n \
                --arg d "$SHORT" \
                --arg f "$FULL" \
                '{description: $d, full_description: $f}')")
            HTTP_STATUS=$(echo "${RESPONSE}" | tail -1)
            if [[ "${HTTP_STATUS}" != "200" ]]; then
              echo "error: failed to update ${agent} (HTTP ${HTTP_STATUS})"
              echo "response body: $(echo "${RESPONSE}" | head -n -1)"
              exit 1
            fi
            echo "updated: ${agent}"
          done

      - name: Commit and push wiki state
        shell: bash
        env:
          CHECKED_AT: ${{ needs.detect.outputs.checked_at }}
        run: |
          set -euo pipefail
          cd wiki

          if [[ -z "$(git status --porcelain -- automation/agent-versions.json Container-Versions.md)" ]]; then
            echo "No wiki state changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/agent-versions.json Container-Versions.md
          git commit -m "chore: update container version state (${CHECKED_AT})"
          git push

  sync-hub-descriptions:
    if: inputs.update_descriptions == true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone wiki repository
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" \
            wiki

      - name: Generate Docker Hub descriptions
        shell: bash
        run: |
          set -euo pipefail
          node scripts/generate-hub-descriptions.mjs \
            --catalog wiki/automation/agent-versions.json \
            --descriptions descriptions
          generated=$(find descriptions -path "*/output/overview.md" | wc -l)
          if [[ "${generated}" -eq 0 ]]; then
            echo "error: no description output files were generated"
            echo "descriptions/ contents:"
            ls -la descriptions/ || echo "(directory not found)"
            exit 1
          fi
          echo "Generated descriptions for ${generated} agent(s)"

      - name: Update Docker Hub descriptions
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN=$(curl -s -X POST "https://hub.docker.com/v2/users/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            | jq -r .token)
          if [[ -z "${TOKEN}" || "${TOKEN}" == "null" ]]; then
            echo "error: Docker Hub login failed — check DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets"
            exit 1
          fi

          for agent in auggie claude codex copilot devstral gemini opencode; do
            output_dir="descriptions/${agent}/output"
            if [[ ! -f "${output_dir}/short-description.txt" || ! -f "${output_dir}/overview.md" ]]; then
              echo "Skipping ${agent}: output files not found"
              continue
            fi
            SHORT=$(cat "${output_dir}/short-description.txt")
            FULL=$(cat "${output_dir}/overview.md")
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X PATCH "https://hub.docker.com/v2/repositories/vibepod/${agent}/" \
              -H "Authorization: JWT ${TOKEN}" \
              -H "Content-Type: application/json" \
              --data-binary "$(jq -n \
                --arg d "$SHORT" \
                --arg f "$FULL" \
                '{description: $d, full_description: $f}')")
            HTTP_STATUS=$(echo "${RESPONSE}" | tail -1)
            if [[ "${HTTP_STATUS}" != "200" ]]; then
              echo "error: failed to update ${agent} (HTTP ${HTTP_STATUS})"
              echo "response body: $(echo "${RESPONSE}" | head -n -1)"
              exit 1
            fi
            echo "updated: ${agent}"
          done

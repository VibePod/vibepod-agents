  devstral:
    image: ${AGENT_NAMESPACE:-vibepod}/devstral:${IMAGE_TAG:-latest}
    build:
      context: ./docker/devstral
      dockerfile: Dockerfile

  auggie:
    image: ${AGENT_NAMESPACE:-vibepod}/auggie:${IMAGE_TAG:-latest}
    build:
      context: ./docker/auggie
      dockerfile: Dockerfile

  copilot:
    image: ${AGENT_NAMESPACE:-vibepod}/copilot:${IMAGE_TAG:-latest}
    build:
      context: ./docker/copilot
      dockerfile: Dockerfile

  codex:
    image: ${AGENT_NAMESPACE:-vibepod}/codex:${IMAGE_TAG:-latest}

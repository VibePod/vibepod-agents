services:
  claude:
    image: ${AGENT_NAMESPACE:-vibepod}/claude:${IMAGE_TAG:-latest}
    build:
      context: ./docker/claude
      dockerfile: Dockerfile
      args:
        CLAUDE_CODE_CHANNEL: ${CLAUDE_CODE_CHANNEL:-latest}

  gemini:
    image: ${AGENT_NAMESPACE:-vibepod}/gemini:${IMAGE_TAG:-latest}
    build:
      context: ./docker/gemini
      dockerfile: Dockerfile

  opencode:
    image: ${AGENT_NAMESPACE:-vibepod}/opencode:${IMAGE_TAG:-latest}
